---
- name: Build and install Slurm on Ubuntu 24 controller
  hosts: local
  become: true
  gather_facts: true

  vars:
    slurm_version: "24.05.5"
    slurm_tarball: "slurm-{{ slurm_version }}.tar.bz2"
    slurm_download_url: "https://download.schedmd.com/slurm/{{ slurm_tarball }}"
    slurm_build_root: /tmp/slurm-build
    slurm_src_root: "{{ slurm_build_root }}/src"
    slurm_src_dir: "{{ slurm_src_root }}/slurm-{{ slurm_version }}"
    slurm_sysconfdir: /etc/slurm

  tasks:
    - name: Ensure host is Ubuntu 24
      ansible.builtin.assert:
        that:
          - ansible_distribution == 'Ubuntu'
          - ansible_distribution_major_version == '24'
        fail_msg: "This playbook targets Ubuntu 24 controller hosts only."

    - name: Install package build prerequisites
      ansible.builtin.apt:
        name:
          - build-essential
          - fakeroot
          - devscripts
          - equivs
          - ca-certificates
          - wget
          - bzip2
        state: present
        update_cache: true

    - name: Ensure Slurm build directory exists
      ansible.builtin.file:
        path: "{{ slurm_src_root }}"
        state: directory
        mode: "0755"

    - name: Download Slurm source tarball
      ansible.builtin.get_url:
        url: "{{ slurm_download_url }}"
        dest: "{{ slurm_src_root }}/{{ slurm_tarball }}"
        mode: "0644"

    - name: Remove previous source directory before unpacking
      ansible.builtin.file:
        path: "{{ slurm_src_dir }}"
        state: absent

    - name: Unpack Slurm source
      ansible.builtin.unarchive:
        src: "{{ slurm_src_root }}/{{ slurm_tarball }}"
        dest: "{{ slurm_src_root }}"
        remote_src: true

    - name: Install Slurm package build dependencies
      ansible.builtin.command: mk-build-deps -i -r -t "apt-get -y --no-install-recommends" debian/control
      args:
        chdir: "{{ slurm_src_dir }}"

    - name: Build Slurm DEB packages
      ansible.builtin.command: debuild -b -uc -us
      args:
        chdir: "{{ slurm_src_dir }}"
      environment:
        DEB_CONFIGURE_EXTRA_FLAGS: "--sysconfdir={{ slurm_sysconfdir }}"

    - name: Install built Slurm controller packages with downgrade support
      ansible.builtin.shell: >-
        apt-get install -y --allow-downgrades --no-install-recommends
        {{ slurm_src_root }}/slurm-smd_*_*.deb
        {{ slurm_src_root }}/slurm-smd-client_*_*.deb
        {{ slurm_src_root }}/slurm-smd-slurmctld_*_*.deb
      args:
        executable: /bin/bash
