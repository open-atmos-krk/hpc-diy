name: 'Main Workflow'
on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"
jobs:
  greet:
    runs-on: self-hosted
    steps:
      - name: Cluster Status Check
        shell: bash
        run: |
          echo 'Hello from the $(hostname)!'
          ping -c 5 major-tom
          ping -c 5 ground-control
